name: Uptime Monitor

  on:
    schedule:
      - cron: "0 */4 * * *"
    workflow_dispatch:

  permissions:
    contents: read
    issues: write

  jobs:
    ping:
      name: Live ping
      runs-on: ubuntu-latest
      steps:
        - uses: actions/setup-node@v4
          with: 
            node-version: 20
        - name: Ping homepage + sitemap
          id: ping
          continue-on-error: true
          run: |
            for url in "https://changwon.pages.dev" "https://changwon.pages.dev/sitemap.xml" "https://changwon.pages.dev/robots.txt"; do
              code=$(curl -s -o /dev/null -w "%{http_code}" "$url" || true)
              echo "$url → $code"
              if [[ "$code" != "200" ]]; then
                echo "::error::$url returned $code"
                exit 1
              fi
            done
        - name: Open issue if down
          if: steps.ping.outcome == 'failure'
          uses: actions/github-script@v7
          with: 
            script: |
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: `[Uptime] 사이트 응답 이상 (${new Date().toISOString()})`,
                body: `워크플로우 로그: ${context.payload.repository.html_url}/actions/runs/${context.runId}`,
                labels: ['uptime','auto'],
              });
